          <!-- Supabase Cloud Sync Config Panel -->
          <div class="card">
            <h3 class="card-title" style="margin-bottom:1rem;"><i data-lucide="cloud"></i> Kredensial Database Supabase</h3>
            <p style="font-size:0.875rem; color:var(--text-secondary); margin-bottom:1.5rem; line-height:1.5;">Gunakan database cloud Supabase untuk menyimpan seluruh data secara permanen & berkolaborasi secara real-time. Kosongkan untuk tetap bermain offline di cache browser Anda.</p>
            
            <form id="form-supabase-config" style="display:flex; flex-direction:column; gap:0.75rem;">
              <div class="form-group" style="margin:0;">
                <label>Supabase URL</label>
                <input type="text" class="form-control" id="settings-supa-url" value="${supaUrl}" placeholder="https://xxxx.supabase.co" ${isAdmin ? "" : "disabled"}>
              </div>
              <div class="form-group" style="margin:0;">
                <label>Supabase Anon Key</label>
                <input type="password" class="form-control" id="settings-supa-key" value="${supaKey}" placeholder="eyJhbGciOiJIUzI1NiI..." ${isAdmin ? "" : "disabled"}>
              </div>
              
              ${isAdmin ? `
                <div style="display:flex; gap:0.5rem; margin-top:0.5rem;">
                  <button type="button" class="btn btn-secondary" onclick="testCloudConnection()"><i data-lucide="refresh-cw"></i> Uji Koneksi</button>
                  <button type="submit" class="btn btn-primary"><i data-lucide="save"></i> Simpan Setelan</button>
                </div>
              ` : `
                <p style="font-size:0.8rem; text-align:center; color:var(--text-secondary); font-style:italic; padding:1rem; border:1px dashed var(--border-color); border-radius:6px; margin-top:0.5rem;">Kredensial database hanya dapat diubah setelah login sebagai Admin.</p>
              `}
            </form>
          </div>
        </div>

        <!-- Event Management Card -->
        <div class="card" style="margin-top: 1.5rem;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem;">
            <h3 class="card-title" style="margin:0;"><i data-lucide="layers"></i> Manajemen Multi-Event</h3>
            ${isAdmin ? `<button class="btn btn-primary" onclick="window.createNewEventWizard()"><i data-lucide="plus"></i> Tambah Event Acara</button>` : ''}
          </div>
          <p style="font-size:0.875rem; color:var(--text-secondary); margin-bottom:1.25rem; line-height:1.5;">Kelola banyak perayaan kemerdekaan desa. Pilih event mana yang aktif untuk ditampilkan di Dashboard, atau arsipkan event tahun lalu agar tidak sengaja diubah.</p>
          
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Nama Event / Tahun</th>
                  <th>Status</th>
                  <th>Aksi Admin</th>
                </tr>
              </thead>
              <tbody>
                ${eventRows || "<tr><td colspan='3' style='text-align:center; padding:1.5rem; color:var(--text-secondary);'>Belum ada event perayaan.</td></tr>"}
              </tbody>
            </table>
          </div>
        </div>

        <!-- Factory Reset Card -->
        <div class="card" style="border-color: rgba(239, 68, 68, 0.2); background-color: rgba(239, 68, 68, 0.01); margin-top: 1.5rem;">
          <h3 class="card-title" style="color: var(--accent-red); margin-bottom:0.5rem;"><i data-lucide="rotate-ccw"></i> Reset Sistem Pabrik</h3>
          <p style="font-size:0.875rem; color:var(--text-secondary); line-height:1.5; margin-bottom:1rem;">Tindakan ini akan menghapus semua cache local storage browser Anda dan mengembalikan aplikasi ke data bawaan awal mula. Harap lakukan backup JSON terlebih dahulu.</p>
          ${isAdmin ? `
            <button class="btn btn-danger" onclick="triggerFactoryReset()"><i data-lucide="alert-triangle"></i> Reset Cache & Data Sistem</button>
          ` : `
            <p style="font-size:0.8rem; text-align:center; color:var(--text-secondary); font-style:italic; padding:1rem; border:1px dashed var(--border-color); border-radius:6px;">Reset pabrik hanya diperkenankan setelah login sebagai Admin.</p>
          `}
        </div>
      `;

      // Bind global event actions
      window.switchActiveEvent = async (id) => {
        if (!Auth.isAdmin()) {
          Toast.show("Akses ditolak! Khusus Admin Desa.", "error");
          return;
        }
        await EventManager.setActiveEventId(id);
      };

      window.archiveEvent = async (id) => {
        if (!Auth.isAdmin()) {
          Toast.show("Akses ditolak! Khusus Admin Desa.", "error");
          return;
        }
        UI.openDeleteConfirm(async () => {
          await EventManager.archiveEvent(id);
          UI.refreshCurrentView();
        });
      };

      window.unarchiveEvent = async (id) => {
        if (!Auth.isAdmin()) {
          Toast.show("Akses ditolak! Khusus Admin Desa.", "error");
          return;
        }
        await EventManager.unarchiveEvent(id);
        UI.refreshCurrentView();
      };

      window.createNewEventWizard = () => {
        if (!Auth.isAdmin()) {
          Toast.show("Akses ditolak! Khusus Admin Desa.", "error");
          return;
        }
        UI.openGenericModal("Tambah Event Acara Baru", [
          { id: "nama", label: "Nama Event / Perayaan", required: true, placeholder: "Contoh: Pesta Rakyat & HUT RI 82 Desa Sukomaju" },
          { id: "tema", label: "Tema Acara", required: true, placeholder: "Contoh: Nusantara Baru, Indonesia Maju" },
          { id: "lokasi", label: "Lokasi Pelaksanaan", required: true, placeholder: "Contoh: Lapangan Merdeka Desa" },
          { id: "tanggal", label: "Tanggal Pelaksanaan", type: "date", required: true, value: new Date().toISOString().slice(0, 10) }
        ], async (data) => {
          UI.showLoadingOverlay("Membuat Event...", "Menyiapkan database multi-event...");
          try {
            await EventManager.addEvent(data.nama, {
              tema: data.tema,
              lokasi: data.lokasi,
              tanggal: data.tanggal
            });
            Toast.show(`Event "${data.nama}" berhasil dibuat dan diaktifkan!`, "success");
            UI.refreshCurrentView();
          } catch(err) {
            Toast.show(`Gagal membuat event: ${err.message}`, "error");
          } finally {
            UI.hideLoadingOverlay();
          }
        });
      };

      // Bind PIN Change listener
      if (isAdmin) {
        const formPin = document.getElementById('form-change-pin');
        if (formPin) {
          formPin.addEventListener('submit', (e) => {
            e.preventDefault();
            const val = document.getElementById('settings-pin').value;
            if (Auth.changeCode(val)) {
              Toast.show("PIN Keamanan Admin berhasil diubah!", "success");
              document.getElementById('settings-pin').value = "";
            } else {
              Toast.show("PIN minimal 4 karakter!", "error");
            }
          });
        }
      }

      // Bind Supabase listener
      const formSupa = document.getElementById('form-supabase-config');
      if (formSupa && isAdmin) {
        formSupa.addEventListener('submit', (e) => {
          e.preventDefault();
          if (!Auth.isAdmin()) {
            Toast.show("Akses ditolak!", "error");
            return;
          }
          const url = document.getElementById('settings-supa-url').value.trim();
          const key = document.getElementById('settings-supa-key').value.trim();

          localStorage.setItem('pesta17_supabase_url', url);
          localStorage.setItem('pesta17_supabase_key', key);

          Supa.init();
          if (Supa.connected) {
            Supa.syncFromCloud().then(() => {
              UI.refreshCurrentView();
            });
          } else {
            Toast.show("Setelan disimpan. Mode beralih offline", "info");
            UI.refreshCurrentView();
          }
        });
      }
    }

    // Cloud connection test
    async function testCloudConnection() {
      if (!Auth.isAdmin()) {
        Toast.show("Akses ditolak! Anda harus masuk sebagai Admin.", "error");
        return;
      }
      const url = document.getElementById('settings-supa-url').value.trim();
      const key = document.getElementById('settings-supa-key').value.trim();

      if (!url || !key) {
        Toast.show("Harap masukkan URL dan Key terlebih dahulu!", "warning");
        return;
      }

      Toast.show("Menguji koneksi ke Supabase...", "info");
      const res = await Supa.testConnection(url, key);
      if (res.success) {
        Toast.show("Koneksi Sukses! Struktur tabel cocok dan siap digunakan.", "success");
      } else {
        Toast.show(res.msg, "error");
      }
    }

    // Reset System callback
    function triggerFactoryReset() {
      if (!Auth.isAdmin()) {
        Toast.show("Akses ditolak! Anda harus masuk sebagai Admin.", "error");
        return;
      }
      UI.openDeleteConfirm(() => {
        localStorage.clear();
        sessionStorage.clear();
        Toast.show("Sistem berhasil di-reset ke kondisi awal. Muat ulang halaman...", "success");
        setTimeout(() => {
          window.location.reload();
        }, 1500);
      });
    }

    // Diagnostik Sistem & Audit Log View Renderer (Admin Only)
    async function renderDiagnostics(container) {
      if (!Auth.isAdmin()) {
        container.innerHTML = `<p style="padding: 2rem; color: #EF4444; font-weight: bold;">⚠️ Akses Ditolak. Halaman ini khusus Admin Desa.</p>`;
        return;
      }

      const url = localStorage.getItem('pesta17_supabase_url') || '(Belum Dikonfigurasi)';
      const key = localStorage.getItem('pesta17_supabase_key') ? '••••••••••••••••••••••••••••••••' : '(Belum Dikonfigurasi)';
      
      // Check database status
      const isOnline = Supa.connected && Supa.db;
      
      // Table schemas
      const tables = [
        { name: 'pesta17_info', desc: 'Informasi Utama Acara' },
        { name: 'pesta17_dusun', desc: 'Kontingen Dusun' },
        { name: 'pesta17_panitia', desc: 'Panitia Pelaksana' },
        { name: 'pesta17_lomba', desc: 'Cabang Perlombaan' },
        { name: 'pesta17_peserta', desc: 'Daftar Peserta Warga' },
        { name: 'pesta17_anggaran', desc: 'Anggaran & Pengeluaran' },
        { name: 'pesta17_sponsor', desc: 'Sponsor & Mitra' },
        { name: 'pesta17_inventaris', desc: 'Inventaris Peralatan' },
        { name: 'pesta17_timeline', desc: 'Timeline Kegiatan' },
        { name: 'pesta17_dokumentasi', desc: 'Galeri Media' },
        { name: 'pesta17_checklist_persiapan', desc: 'Checklist Persiapan' },
        { name: 'pesta17_audit_log', desc: 'Audit Log Aktivitas' }
      ];

      // Render diagnostic details
      let logsHtml = (AppState.audit_log || [])
        .map(l => `
          <tr>
            <td style="font-family: var(--font-mono); font-size: 0.8rem;">${l.tanggal} ${l.jam}</td>
            <td><span class="badge badge-gray">${l.menu}</span></td>
            <td style="font-weight: 600;">${l.aksi}</td>
            <td><span class="badge badge-amber" style="background: #FFFbeb; border-color: #F59E0B; color: #D97706;"><i data-lucide="shield" style="width:0.8rem; height:0.8rem; display:inline; vertical-align:middle; margin-right:2px;"></i> ${l.pengguna || 'Admin'}</span></td>
          </tr>
        `).join('');

      if (!logsHtml) {
        logsHtml = `<tr><td colspan="4" style="text-align: center; color: var(--text-secondary); padding: 1.5rem;">Belum ada riwayat aktivitas tercatat.</td></tr>`;
      }

      container.innerHTML = `
        <div style="display: flex; flex-direction: column; gap: 1.5rem;">
          <!-- Connection Card -->
          <div class="card">
            <div class="card-header">
              <h2 class="card-title">Koneksi & Status Database Cloud</h2>
              <span class="badge ${isOnline ? 'badge-emerald' : 'badge-amber'}">
                ${isOnline ? 'TERHUBUNG' : 'OFFLINE'}
              </span>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;" class="grid-2">
              <div style="background: var(--bg-secondary); border: 2px solid var(--border-color); padding: 1rem;">
                <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); font-weight: bold;">Supabase Endpoint URL</p>
                <p style="font-weight: 600; font-family: var(--font-mono); margin-top: 0.25rem; word-break: break-all;">${url}</p>
              </div>
              <div style="background: var(--bg-secondary); border: 2px solid var(--border-color); padding: 1rem;">
                <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); font-weight: bold;">Supabase Anon Key</p>
                <p style="font-weight: 600; font-family: var(--font-mono); margin-top: 0.25rem; word-break: break-all;">${key}</p>
              </div>
            </div>
            <div style="margin-top: 1.25rem; display: flex; gap: 0.75rem; flex-wrap: wrap;">
              <button class="btn btn-primary" onclick="window.runDiagnosticSync()"><i data-lucide="refresh-cw"></i> Sinkronisasi Cloud Sekarang</button>
              <button class="btn btn-secondary" onclick="window.clearLocalCache()"><i data-lucide="trash"></i> Hapus Cache Lokal</button>
            </div>
          </div>

          <!-- Tables Integrity Check -->
          <div class="card">
            <div class="card-header">
              <h2 class="card-title">Integritas Struktur Tabel Supabase</h2>
            </div>
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem;">Memverifikasi ketersediaan relasi tabel di database Supabase Anda untuk mencegah error input/output.</p>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 0.75rem;" class="grid-2">
              ${tables.map(t => {
                const checked = isOnline; // If connected, table integrity assumed or tested
                return `
                  <div style="display: flex; align-items: center; justify-content: space-between; padding: 0.75rem; background: var(--bg-secondary); border: 2px solid var(--border-color);">
                    <div>
                      <p style="font-weight: 700; font-family: var(--font-mono); font-size: 0.85rem;">${t.name}</p>
                      <p style="font-size: 0.7rem; color: var(--text-secondary);">${t.desc}</p>
                    </div>
                    <div style="display: flex; align-items: center; justify-content: center; width: 2rem; height: 2rem; border-radius: 9999px; background: ${checked ? '#DEF7EC' : '#FEE2E2'}; border: 2px solid ${checked ? '#0E9F6E' : '#F87171'}; color: ${checked ? '#0E9F6E' : '#EF4444'};">
                      <i data-lucide="${checked ? 'check' : 'x'}" style="width: 1.1rem; height: 1.1rem;"></i>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>

          <!-- Audit Log Table Card -->
          <div class="card">
            <div class="card-header" style="justify-content: space-between; align-items: center;">
              <h2 class="card-title">Audit Log Aktivitas Administrator</h2>
              <div style="display: flex; gap: 0.5rem;">
                <button class="btn btn-secondary btn-sm" onclick="window.exportAuditJson()"><i data-lucide="download"></i> Ekspor JSON</button>
                <button class="btn btn-secondary btn-sm btn-danger" onclick="window.clearAuditLogs()" style="background:#EF4444; color:white;"><i data-lucide="trash-2"></i> Bersihkan Log</button>
              </div>
            </div>
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem;">Mencatat secara kronologis seluruh perubahan data, konfigurasi, dan aktivitas yang dilakukan oleh Administrator Desa.</p>
            
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>Waktu Aktivitas</th>
                    <th>Modul / Menu</th>
                    <th>Uraian Tindakan</th>
                    <th>Pengguna</th>
                  </tr>
                </thead>
                <tbody>
                  ${logsHtml}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;

      // Helper function binding
      window.runDiagnosticSync = async () => {
        UI.showLoadingOverlay("Sinkronisasi...", "Sedang menyinkronkan data dengan Supabase Cloud...");
        const success = await Supa.syncFromCloud();
        UI.hideLoadingOverlay();
        if (success) {
          Toast.show("Sinkronisasi data sukses!", "success");
        }
        renderDiagnostics(container);
      };

      window.clearLocalCache = () => {
        UI.openDeleteConfirm(() => {
          const keys = ['info', 'dusun', 'panitia', 'lomba', 'peserta', 'anggaran', 'sponsor', 'inventaris', 'timeline', 'dokumentasi', 'checklist_persiapan', 'audit_log'];
          keys.forEach(k => localStorage.removeItem(`pesta17_cache_${k}`));
          Toast.show("Cache lokal berhasil dihapus!", "success");
          window.location.reload();
        });
      };

      window.exportAuditJson = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(AppState.audit_log || [], null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `pesta17_audit_log_${Date.now()}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        Toast.show("Ekspor Audit Log berhasil!", "success");
      };

      window.clearAuditLogs = () => {
        UI.openDeleteConfirm(async () => {
          UI.showLoadingOverlay("Membersihkan...", "Menghapus riwayat aktivitas...");
          AppState.audit_log = [];
          Supa.saveLocalCache();
          if (Supa.connected && Supa.db) {
            await Supa.db.from('pesta17_audit_log').delete().neq('id', 'placeholder');
          }
          UI.hideLoadingOverlay();
          Toast.show("Audit log berhasil dibersihkan!", "success");
          renderDiagnostics(container);
        });
      };

      if (window.lucide) window.lucide.createIcons();
    }
  </script>

  <!-- 8. App Bootstrapper -->
  <script id="js-init">
    function toggleTheme() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('pesta17_theme', isDark ? 'dark' : 'light');
      document.getElementById('btn-theme').innerHTML = `<i data-lucide="${isDark ? 'sun' : 'moon'}"></i>`;
      lucide.createIcons();
    }
    if (localStorage.getItem('pesta17_theme') === 'dark') {
      document.body.classList.add('dark');
    }
    
    // Bootstrapper hook
    window.addEventListener('DOMContentLoaded', async () => {
      console.log("PESTA 17 UI Ready");
      
      // Show full screen neo-brutalist loading screen during startup
      UI.showLoadingOverlay("Pesta 17", "Menghubungkan ke database desa...");
      
      try {
        Supa.init();
        if (Supa.connected) {
          await Supa.syncFromCloud();
        } else {
          Supa.loadLocalCache();
        }
      } catch (e) {
        console.error("Bootstrapper initialization failed, loading local cache:", e);
        Supa.loadLocalCache();
      }
      
      // Initialize UI Router & render active view with updated AppState
      UI.init();
      
      // Stagger hide for smooth transition
      setTimeout(() => {
        UI.hideLoadingOverlay();
      }, 500);
    });
  </script>

  <!-- ══════════════════════════════════════════════════════════
       9. PWA: Service Worker Registration + Install Prompt
       ══════════════════════════════════════════════════════════ -->
  <script id="js-pwa">
    // ── Service Worker Registration ──────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
          .then((reg) => {
            console.log('[PWA] Service Worker registered, scope:', reg.scope);
          })
          .catch((err) => {
            console.warn('[PWA] Service Worker registration failed:', err);
          });
      });
    }

    // ── Install Prompt (Android / Chrome) ───────────────────────
    let _deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      _deferredPrompt = e;

      // Show the install button
      const btn = document.getElementById('btn-pwa-install');
      if (btn) {
        btn.style.display = 'inline-flex';
        if (window.lucide) window.lucide.createIcons();
      }
    });

    window.installPWA = async function () {
      if (!_deferredPrompt) return;
      _deferredPrompt.prompt();
      const { outcome } = await _deferredPrompt.userChoice;
      console.log('[PWA] Install outcome:', outcome);
      _deferredPrompt = null;

      // Hide button after user responds
      const btn = document.getElementById('btn-pwa-install');
      if (btn) btn.style.display = 'none';
    };

    // Hide button once app is already installed
    window.addEventListener('appinstalled', () => {
      const btn = document.getElementById('btn-pwa-install');
      if (btn) btn.style.display = 'none';
      console.log('[PWA] App installed successfully');
    });
  </script>
</body>
</html>
